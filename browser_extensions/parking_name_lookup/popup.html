<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <title>Fibaro10 områdeoppslag</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Områdeoppslag</h1>
    <p>Henter biler som mangler område, leser Vegvesen-siden og skriver tilbake til Fibaro10.</p>
  </header>

  <section class="card">
    <label>Fibaro10 URL
      <input id="apiBase" placeholder="https://fibaro10...">
    </label>
    <div class="cols">
      <label>Brukernavn
        <input id="apiUsername" autocomplete="username">
      </label>
      <label>Passord
        <input id="apiPassword" type="password" autocomplete="current-password">
      </label>
    </div>
    <label>Vegvesen URL-mal
      <input id="lookupUrlTemplate" placeholder="https://...kjennemerke={plate}">
    </label>
    <div class="actions">
      <button id="saveSettings" class="secondary">Lagre oppsett</button>
      <button id="runAll" class="primary">Hent og skriv 1000</button>
    </div>
  </section>

  <section class="card status-card">
    <div class="status-grid">
      <div>
        <span>Status</span>
        <strong id="message">Klar</strong>
      </div>
      <div>
        <span>Fremdrift</span>
        <strong id="counter">0/0</strong>
      </div>
    </div>
    <div class="current">
      <span>Aktiv bil</span>
      <strong id="currentPlate">-</strong>
    </div>
  </section>

  <section class="card log-card">
    <div class="log-title">Logg</div>
    <div id="log"></div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
