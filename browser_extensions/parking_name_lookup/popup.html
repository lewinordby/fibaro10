<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <title>Fibaro10 navneoppslag</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Navneoppslag</h1>
    <p>Kjor listen mot fanen du er innlogget i.</p>
  </header>

  <section class="card">
    <div class="row">
      <button id="fetchBatch" class="secondary">Hent 100 fra Fibaro10</button>
      <button id="saveSettings" class="secondary">Lagre oppsett</button>
    </div>
    <label>Registreringsnummer
      <textarea id="plates" placeholder="AB12345&#10;CD67890"></textarea>
    </label>
  </section>

  <section class="card settings">
    <details>
      <summary>Oppsett</summary>
      <label>Fibaro10 URL
        <input id="apiBase" placeholder="https://fibaro10...">
      </label>
      <div class="cols">
        <label>Brukernavn
          <input id="apiUsername" autocomplete="username">
        </label>
        <label>Passord
          <input id="apiPassword" type="password" autocomplete="current-password">
        </label>
      </div>
      <label>Sokefelt selector
        <input id="searchInputSelector" placeholder="input[name='q']">
      </label>
      <label>Sokeknapp selector, tom = Enter
        <input id="searchButtonSelector" placeholder="button[type='submit']">
      </label>
      <label>Resultat/navn selector
        <input id="resultSelector" placeholder=".customer-name">
      </label>
      <label>Regex for navn, valgfritt
        <input id="resultRegex" placeholder="Navn:\\s*(.+)">
      </label>
      <div class="cols">
        <label>Vent etter sok, ms
          <input id="resultWaitMs" type="number" min="200" step="100">
        </label>
        <label>Pause mellom, ms
          <input id="betweenDelayMs" type="number" min="0" step="100">
        </label>
      </div>
    </details>
  </section>

  <section class="card">
    <div class="row">
      <button id="start" class="primary">Start</button>
      <button id="stop" class="danger">Stopp</button>
      <button id="testOne" class="secondary">Test 1</button>
    </div>
    <div class="status">
      <span id="counter">0/0</span>
      <span id="message">Klar</span>
    </div>
  </section>

  <section class="card log-card">
    <div class="log-title">Logg</div>
    <div id="log"></div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
