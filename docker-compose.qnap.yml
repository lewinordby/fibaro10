services:
  fibaro10:
    build:
      context: .
      args:
        APP_COMMIT: ${APP_COMMIT:-unknown}
    container_name: fibaro10
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "192.168.20.218:8110:8110"
    volumes:
      - ./axis_camera_snapshots/snapshots:/axis_snapshots:ro
    environment:
      SUN2_AXIS_SNAPSHOT_ROOT: /axis_snapshots
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8110/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  online_dashboard:
    build:
      context: .
      dockerfile: online_dashboard/Dockerfile
    container_name: online_dashboard
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8111/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  axis_camera_snapshots:
    build:
      context: ./axis_camera_snapshots
    container_name: axis_camera_snapshots
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "192.168.20.218:8125:8125"
    volumes:
      - ./axis_camera_snapshots/data:/data
      - ./axis_camera_snapshots/snapshots:/snapshots
    environment:
      AXIS_DATA_DIR: /data
      AXIS_SNAPSHOT_DIR: /snapshots
      AXIS_INTERVAL_SECONDS: ${AXIS_INTERVAL_SECONDS:-5}
      AXIS_CAPTURE_START_TIME: ${AXIS_CAPTURE_START_TIME:-06:45}
      AXIS_CAPTURE_END_TIME: ${AXIS_CAPTURE_END_TIME:-23:00}
      AXIS_RETENTION_DAYS: ${AXIS_RETENTION_DAYS:-7}
      AXIS_AUTH_MODE: ${AXIS_AUTH_MODE:-auto}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8125/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  car_info_lookup:
    build:
      context: ./car_info_lookup
    container_name: car_info_lookup
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - fibaro10
    ports:
      - "192.168.20.218:8126:8126"
    volumes:
      - ./car_info_lookup/data:/data
    environment:
      FIBARO10_BASE_URL: http://fibaro10:8110
      CAR_INFO_DATA_DIR: /data
      CAR_INFO_RUN_INTERVAL_MINUTES: ${CAR_INFO_RUN_INTERVAL_MINUTES:-30}
      CAR_INFO_BATCH_SIZE: ${CAR_INFO_BATCH_SIZE:-1}
      CAR_INFO_REQUEST_DELAY_SECONDS: ${CAR_INFO_REQUEST_DELAY_SECONDS:-300}
      CAR_INFO_RATE_LIMIT_BACKOFF_MINUTES: ${CAR_INFO_RATE_LIMIT_BACKOFF_MINUTES:-240}
      CAR_INFO_BACKLOG_ENABLED: ${CAR_INFO_BACKLOG_ENABLED:-true}
      CAR_INFO_BACKLOG_MAX_PER_CYCLE: ${CAR_INFO_BACKLOG_MAX_PER_CYCLE:-12}
      CAR_INFO_BACKLOG_DELAY_SECONDS: ${CAR_INFO_BACKLOG_DELAY_SECONDS:-300}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8126/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
 
  fibaro10_proxy:
    image: caddy:2-alpine
    container_name: fibaro10_proxy
    restart: unless-stopped
    depends_on:
      - online_dashboard
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - fibaro10_caddy_data:/data
      - fibaro10_caddy_config:/config

volumes:
  fibaro10_caddy_data:
  fibaro10_caddy_config:
