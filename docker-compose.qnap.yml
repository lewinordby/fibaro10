services:
  owntracks_service:
    build:
      context: ./owntracks_service
    container_name: owntracks_service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "192.168.20.218:8128:8128"
    volumes:
      - ${OWNTRACKS_HOST_DATA_DIR:-./owntracks_service/data}:/data
    environment:
      OWNTRACKS_DATA_DIR: /data
      OWNTRACKS_PUBLIC_BASE_URL: ${OWNTRACKS_PUBLIC_BASE_URL:-https://owntracks.lilletorget.net}
      OWNTRACKS_APP_BUILD: ${OWNTRACKS_APP_BUILD:-14}
      OWNTRACKS_APP_COMMIT: ${APP_COMMIT:-unknown}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8128/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  fibaro10:
    build:
      context: .
      args:
        APP_COMMIT: ${APP_COMMIT:-unknown}
    container_name: fibaro10
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "192.168.20.218:8110:8110"
    volumes:
      - ${AXIS_HOST_SNAPSHOT_DIR:-./axis_camera_snapshots/snapshots}:/axis_snapshots:ro
    environment:
      SUN2_AXIS_SNAPSHOT_ROOT: /axis_snapshots
      CAR_INFO_LOOKUP_URL: http://car_info_lookup:8126
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8110/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  online_dashboard:
    build:
      context: .
      dockerfile: online_dashboard/Dockerfile
    container_name: online_dashboard
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8111/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  maintenance_mobile:
    build:
      context: .
      dockerfile: maintenance_mobile/Dockerfile
    container_name: maintenance_mobile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - fibaro10
    environment:
      FIBARO10_BASE_URL: http://fibaro10:8110
      MAINTENANCE_MOBILE_SESSION_SECRET: ${MAINTENANCE_MOBILE_SESSION_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8112/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  axis_camera_snapshots:
    build:
      context: ./axis_camera_snapshots
    container_name: axis_camera_snapshots
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "192.168.20.218:8125:8125"
    volumes:
      - ${AXIS_HOST_DATA_DIR:-./axis_camera_snapshots/data}:/data
      - ${AXIS_HOST_SNAPSHOT_DIR:-./axis_camera_snapshots/snapshots}:/snapshots
    environment:
      AXIS_DATA_DIR: /data
      AXIS_SNAPSHOT_DIR: /snapshots
      AXIS_INTERVAL_SECONDS: ${AXIS_INTERVAL_SECONDS:-5}
      AXIS_CAPTURE_START_TIME: ${AXIS_CAPTURE_START_TIME:-06:45}
      AXIS_CAPTURE_END_TIME: ${AXIS_CAPTURE_END_TIME:-23:00}
      AXIS_RETENTION_DAYS: ${AXIS_RETENTION_DAYS:-7}
      AXIS_AUTH_MODE: ${AXIS_AUTH_MODE:-auto}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8125/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  car_info_lookup:
    build:
      context: ./car_info_lookup
    container_name: car_info_lookup
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - fibaro10
    ports:
      - "192.168.20.218:8126:8126"
    volumes:
      - ${CAR_INFO_HOST_DATA_DIR:-./car_info_lookup/data}:/data
    environment:
      FIBARO10_BASE_URL: http://fibaro10:8110
      CAR_INFO_DATA_DIR: /data
      CAR_INFO_URL_TEMPLATE: ${CAR_INFO_URL_TEMPLATE:-https://biluppgifter.se/fordon/{plate_lower}/}
      TJEKBIL_URL_TEMPLATE: ${TJEKBIL_URL_TEMPLATE:-https://www.tjekbil.dk/api/v3/dmr/regnr/{plate}}
      CAR_INFO_RUN_INTERVAL_MINUTES: ${CAR_INFO_RUN_INTERVAL_MINUTES:-30}
      CAR_INFO_BATCH_SIZE: ${CAR_INFO_BATCH_SIZE:-1}
      CAR_INFO_REQUEST_DELAY_SECONDS: ${CAR_INFO_REQUEST_DELAY_SECONDS:-300}
      CAR_INFO_RATE_LIMIT_BACKOFF_MINUTES: ${CAR_INFO_RATE_LIMIT_BACKOFF_MINUTES:-240}
      CAR_INFO_BACKLOG_ENABLED: ${CAR_INFO_BACKLOG_ENABLED:-true}
      CAR_INFO_BACKLOG_MAX_PER_CYCLE: ${CAR_INFO_BACKLOG_MAX_PER_CYCLE:-1000}
      CAR_INFO_BACKLOG_DELAY_SECONDS: ${CAR_INFO_BACKLOG_DELAY_SECONDS:-300}
      CAR_INFO_SWEDISH_BACKLOG_DELAY_SECONDS: ${CAR_INFO_SWEDISH_BACKLOG_DELAY_SECONDS:-2}
      CAR_INFO_DANISH_BACKLOG_DELAY_SECONDS: ${CAR_INFO_DANISH_BACKLOG_DELAY_SECONDS:-0}
      CAR_INFO_BACKLOG_COUNTRY_SEQUENCE: ${CAR_INFO_BACKLOG_COUNTRY_SEQUENCE:-DK,S}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8126/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  sun2_session_scraper:
    build:
      context: ./sun2_session_scraper
    container_name: sun2_session_scraper
    restart: unless-stopped
    env_file:
      - ./sun2_session_scraper/.env
    depends_on:
      - fibaro10
    ports:
      - "192.168.20.218:8099:8098"
    volumes:
      - ${SUN2_SESSION_SCRAPER_HOST_DATA_DIR:-./sun2_session_scraper/data}:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8098/json', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
 
  parking_sun_linker:
    build:
      context: ./parking_sun_linker
    container_name: parking_sun_linker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - fibaro10
    ports:
      - "192.168.20.218:8127:8127"
    environment:
      FIBARO10_BASE_URL: http://fibaro10:8110
      KOBLE_RUN_ON_START: ${KOBLE_RUN_ON_START:-true}
      KOBLE_LOOP_SLEEP_SECONDS: ${KOBLE_LOOP_SLEEP_SECONDS:-0.2}
      KOBLE_BATCH_SIZE: ${KOBLE_BATCH_SIZE:-25}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8127/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  fibaro10_proxy:
    image: caddy:2-alpine
    container_name: fibaro10_proxy
    restart: unless-stopped
    depends_on:
      - online_dashboard
      - owntracks_service
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${FIBARO10_CADDY_DATA_DIR:-fibaro10_caddy_data}:/data
      - ${FIBARO10_CADDY_CONFIG_DIR:-fibaro10_caddy_config}:/config

volumes:
  fibaro10_caddy_data:
  fibaro10_caddy_config:
