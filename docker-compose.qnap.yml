services:
  fibaro10:
    build: .
    container_name: fibaro10
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "192.168.20.218:8110:8110"

  online_dashboard:
    build:
      context: .
      dockerfile: online_dashboard/Dockerfile
    container_name: online_dashboard
    restart: unless-stopped
    env_file:
      - .env

  fibaro10_proxy:
    image: caddy:2-alpine
    container_name: fibaro10_proxy
    restart: unless-stopped
    depends_on:
      - online_dashboard
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - fibaro10_caddy_data:/data
      - fibaro10_caddy_config:/config

volumes:
  fibaro10_caddy_data:
  fibaro10_caddy_config:
