<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logg inn</title>
    <style>
        :root { color-scheme: light; --bg:#f7f7f7; --panel:#fff; --line:#e6e6e6; --text:#3a3d44; --muted:#5f6670; --brand:#5292d6; }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); }
        .login-top { background: white; padding: 4.2rem 1.2rem 5rem; text-align: center; border-bottom: 1px solid var(--line); position: relative; }
        .login-top::after { content: ""; position: absolute; left: 50%; bottom: -1.05rem; width: 2.1rem; height: 2.1rem; background: white; transform: translateX(-50%) rotate(45deg); border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
        .login-logo-link { display: inline-flex; border-radius: 6px; margin-bottom: 1.7rem; }
        .login-logo-link:focus-visible { outline: 3px solid rgba(82, 146, 214, 0.28); outline-offset: 4px; }
        .login-logo { width: 15.5rem; max-width: 70vw; height: auto; display: block; }
        h1 { margin: 0; font-size: 1.55rem; font-weight: 400; }
        main { width: min(100% - 2rem, 40rem); margin: 0 auto; padding: 6.2rem 0 2rem; }
        form { display: grid; gap: 1.25rem; }
        input { width: 100%; border: 1px solid var(--line); border-radius: 4px; padding: 1.05rem 1rem; font-size: 1.05rem; background: white; color: var(--text); }
        button { border: 1px solid #4779b1; border-radius: 4px; padding: 1rem; background: #4b7fbb; color: white; font-size: 1.05rem; cursor: pointer; }
        .error { margin-bottom: 1rem; padding: 0.8rem 1rem; border: 1px solid #df705d; background: #fbebe8; color: #9d3f31; border-radius: 4px; }
        .hint { margin-top: 1rem; color: var(--muted); font-size: 0.92rem; text-align: center; }
    </style>
</head>
<body>
    <div class="login-top">
        <a class="login-logo-link" href="/" aria-label="Gå til status">
            <img class="login-logo" src="/static/sun2-blue-transparent.png" alt="SUN2">
        </a>
        <h1>Logg inn på grensesnittet.</h1>
    </div>
    <main>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/auth/login">
            <input type="text" name="username" placeholder="Brukernavn" autocomplete="username" autofocus required>
            <input type="password" name="password" placeholder="Passord" autocomplete="current-password" required>
            <button type="submit">Logg inn</button>
        </form>
        <p class="hint">HC3 kan fortsatt poste loggdata uten innlogging.</p>
    </main>
</body>
</html>
