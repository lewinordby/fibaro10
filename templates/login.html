<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logg inn</title>
    <link rel="icon" href="/static/favicon.ico?v=20260525-lilletorget3" sizes="any">
    <link rel="icon" type="image/png" href="/static/lilletorget-favicon.png?v=20260525-lilletorget3">
    <style>
        :root { color-scheme: light; --bg:#f5f7fb; --panel:#fff; --line:#dbe3ec; --text:#26323f; --muted:#64748b; --brand:#071a45; --brand-strong:#10275b; --brand-soft:#fff6e4; --gold:#d29713; }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); }
        .login-top { background: white; padding: 4rem 1.2rem 4.6rem; text-align: center; border-bottom: 1px solid var(--line); position: relative; box-shadow: 0 1px 0 rgba(16,24,40,0.03); }
        .login-top::after { content: ""; position: absolute; left: 50%; bottom: -1.05rem; width: 2.1rem; height: 2.1rem; background: white; transform: translateX(-50%) rotate(45deg); border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
        .login-logo-link { display: inline-grid; justify-items:center; gap:.5rem; border-radius: 10px; margin-bottom: 1.7rem; text-decoration:none; color:var(--brand); }
        .login-logo-link:focus-visible { outline: 3px solid rgba(210, 151, 19, 0.28); outline-offset: 4px; }
        .login-logo { width: 19rem; max-width: 82vw; height: auto; display: block; filter:drop-shadow(0 12px 22px rgba(7,26,69,.08)); }
        .login-wordmark { width: min(28rem, 86vw); }
        .login-brand-name { font-size:clamp(2rem, 7vw, 4.2rem); line-height:.95; font-weight:360; letter-spacing:0 !important; color:var(--brand); }
        .login-brand-subtitle { font-size:clamp(.72rem, 2.2vw, 1.05rem); font-weight:850; letter-spacing:.32em !important; text-transform:uppercase; color:var(--brand); }
        .login-brand-subtitle .amp { color:var(--gold); }
        h1 { margin: 0; font-size: clamp(1.35rem, 4vw, 1.65rem); font-weight: 520; }
        main { width: min(100% - 2rem, 40rem); margin: 0 auto; padding: 5.4rem 0 2rem; }
        form { display: grid; gap: 1rem; background: var(--panel); border: 1px solid var(--line); border-top: 3px solid var(--brand); border-radius: 10px; padding: 1rem; box-shadow: 0 8px 22px rgba(16,24,40,0.08); }
        input { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 1rem; font-size: 1.05rem; background: white; color: var(--text); outline: none; }
        input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(210,151,19,0.24); }
        button { border: 1px solid var(--brand-strong); border-radius: 8px; padding: 1rem; background: var(--brand-strong); color: white; font-size: 1.05rem; font-weight: 720; cursor: pointer; }
        button:hover { background: #071a45; }
        .error { margin-bottom: 1rem; padding: 0.85rem 1rem; border: 1px solid #f2c4bb; background: #fbebe8; color: #9d3f31; border-radius: 8px; }
        .hint { margin-top: 1rem; color: var(--muted); font-size: 0.92rem; text-align: center; }
    </style>
</head>
<body>
    <div class="login-top">
        <a class="login-logo-link" href="/status/dashboard" aria-label="Gå til status">
            <img class="login-logo login-wordmark" src="/static/lilletorget-wordmark.png?v=20260525-lilletorget3" alt="Lilletorget">
        </a>
        <h1>Logg inn på grensesnittet.</h1>
    </div>
    <main>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/auth/login">
            <input type="text" name="username" placeholder="Brukernavn" autocomplete="username" autofocus required>
            <input type="password" name="password" placeholder="Passord" autocomplete="current-password" required>
            <button type="submit">Logg inn</button>
        </form>
        <p class="hint">HC3 kan fortsatt poste loggdata uten innlogging.</p>
    </main>
</body>
</html>
