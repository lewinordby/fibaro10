<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logg inn</title>
    <link rel="icon" href="/static/favicon.ico?v=20260527-login" sizes="any">
    <link rel="icon" type="image/png" href="/static/lilletorget-favicon.png?v=20260527-login">
    <style>
        :root {
            color-scheme: light;
            --bg:#eef3f8;
            --panel:#ffffff;
            --line:#dce5ef;
            --text:#071a45;
            --muted:#66758a;
            --gold:#d29713;
            --gold-dark:#a9780c;
            --navy:#071a45;
            --navy-soft:#122b61;
            --shadow:0 24px 70px rgba(7,26,69,.14);
        }
        * { box-sizing:border-box; }
        html, body { min-height:100%; }
        body {
            margin:0;
            font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color:var(--text);
            background:
                radial-gradient(circle at 18% 18%, rgba(210,151,19,.18), transparent 30rem),
                linear-gradient(135deg, #f9fbfd 0%, var(--bg) 48%, #e6edf6 100%);
        }
        .login-shell {
            width:min(1120px, calc(100% - 2rem));
            min-height:100vh;
            margin:0 auto;
            display:grid;
            grid-template-columns:minmax(0, 1.08fr) minmax(22rem, .72fr);
            align-items:center;
            gap:2rem;
            padding:2rem 0;
        }
        .brand-panel {
            position:relative;
            min-height:35rem;
            display:grid;
            place-items:center;
            padding:2.2rem;
            border:1px solid rgba(220,229,239,.8);
            border-radius:28px;
            background:rgba(255,255,255,.68);
            box-shadow:var(--shadow);
            overflow:hidden;
        }
        .brand-panel::before {
            content:"";
            position:absolute;
            inset:1rem;
            border:1px solid rgba(210,151,19,.18);
            border-radius:22px;
            pointer-events:none;
        }
        .brand-panel::after {
            content:"";
            position:absolute;
            width:16rem;
            height:16rem;
            right:-5rem;
            bottom:-6rem;
            border-radius:50%;
            background:rgba(210,151,19,.12);
            filter:blur(2px);
        }
        .brand-logo {
            position:relative;
            z-index:1;
            width:min(31rem, 86%);
            height:auto;
            display:block;
            filter:drop-shadow(0 18px 32px rgba(7,26,69,.12));
        }
        .login-card {
            border:1px solid var(--line);
            border-radius:24px;
            background:rgba(255,255,255,.92);
            box-shadow:var(--shadow);
            padding:2rem;
            backdrop-filter:blur(18px);
        }
        .login-card header { margin-bottom:1.45rem; }
        .eyebrow {
            margin:0 0 .45rem;
            color:var(--gold-dark);
            font-size:.75rem;
            font-weight:850;
            letter-spacing:.14em;
            text-transform:uppercase;
        }
        h1 {
            margin:0;
            color:var(--navy);
            font-size:clamp(1.8rem, 4vw, 2.35rem);
            line-height:1.04;
            letter-spacing:0;
        }
        .subtitle {
            margin:.65rem 0 0;
            color:var(--muted);
            font-size:.98rem;
            line-height:1.45;
        }
        form { display:grid; gap:.85rem; }
        label {
            display:grid;
            gap:.38rem;
            color:var(--navy);
            font-size:.8rem;
            font-weight:800;
        }
        input {
            width:100%;
            min-height:3.2rem;
            border:1px solid var(--line);
            border-radius:12px;
            padding:.82rem .95rem;
            background:#fff;
            color:var(--navy);
            font:inherit;
            outline:none;
            transition:border-color .16s ease, box-shadow .16s ease, transform .16s ease;
        }
        input:focus {
            border-color:var(--gold);
            box-shadow:0 0 0 4px rgba(210,151,19,.18);
        }
        button {
            min-height:3.25rem;
            margin-top:.25rem;
            border:1px solid var(--navy);
            border-radius:12px;
            background:linear-gradient(135deg, var(--navy), var(--navy-soft));
            color:white;
            font:inherit;
            font-weight:850;
            cursor:pointer;
            box-shadow:0 12px 24px rgba(7,26,69,.18);
            transition:transform .16s ease, box-shadow .16s ease, filter .16s ease;
        }
        button:hover { transform:translateY(-1px); box-shadow:0 16px 28px rgba(7,26,69,.22); }
        button:active { transform:translateY(0); filter:saturate(.96); }
        .error {
            margin:0 0 1rem;
            padding:.85rem 1rem;
            border:1px solid #efc7bf;
            border-radius:12px;
            background:#fff0ed;
            color:#8f3526;
            font-weight:760;
        }
        .login-foot {
            margin:1.1rem 0 0;
            color:var(--muted);
            font-size:.84rem;
            line-height:1.45;
        }
        @media (max-width: 860px) {
            .login-shell {
                grid-template-columns:1fr;
                align-content:start;
                gap:1rem;
                padding:1rem 0 1.4rem;
            }
            .brand-panel {
                min-height:auto;
                padding:1.35rem;
                border-radius:22px;
            }
            .brand-panel::before { inset:.7rem; border-radius:17px; }
            .brand-logo { width:min(23rem, 78vw); }
            .login-card { border-radius:20px; padding:1.25rem; }
        }
    </style>
</head>
<body>
    <main class="login-shell">
        <section class="brand-panel" aria-label="Lilletorget solsenter og parkering">
            <img class="brand-logo" src="/static/lilletorget-login.png?v=20260527-login" alt="Lilletorget solsenter og parkering">
        </section>
        <section class="login-card" aria-labelledby="login-title">
            <header>
                <p class="eyebrow">Lilletorget</p>
                <h1 id="login-title">Logg inn</h1>
                <p class="subtitle">Tilgang til drift, parkering, energi, soling, renhold og tekniske logger.</p>
            </header>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <form method="post" action="/auth/login">
                <label>
                    Brukernavn
                    <input type="text" name="username" placeholder="Skriv brukernavn" autocomplete="username" autofocus required>
                </label>
                <label>
                    Passord
                    <input type="password" name="password" placeholder="Skriv passord" autocomplete="current-password" required>
                </label>
                <button type="submit">Logg inn</button>
            </form>
            <p class="login-foot">Automatiske systemer kan fortsatt levere data uten manuell innlogging.</p>
        </section>
    </main>
</body>
</html>
