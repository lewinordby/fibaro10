<header class="site-header">
    <div class="brand-bar">
        <a class="brand-home" href="/status/dashboard" aria-label="Gå til status">
            <img class="brand-logo" src="/static/sun2-blue-transparent.png" alt="SUN2">
        </a>
        <button class="nav-toggle" type="button" aria-label="Bytt menybredde" title="Bytt menybredde">
            <span class="nav-toggle-lines" aria-hidden="true"></span>
        </button>
        {% include "_nav.html" %}
    </div>
</header>
<script>
    (() => {
        const root = document.documentElement;
        const key = "fibaro10_nav_collapsed";
        const mobileQuery = window.matchMedia("(max-width: 1019px)");
        const apply = (collapsed) => {
            root.classList.toggle("nav-collapsed", collapsed);
            document.querySelector(".nav-toggle")?.setAttribute("aria-pressed", collapsed ? "true" : "false");
        };
        const stored = localStorage.getItem(key);
        apply(stored === null ? mobileQuery.matches : stored === "1");
        document.addEventListener("click", (event) => {
            const button = event.target.closest(".nav-toggle");
            if (!button) return;
            const collapsed = !root.classList.contains("nav-collapsed");
            localStorage.setItem(key, collapsed ? "1" : "0");
            apply(collapsed);
        });
    })();
</script>
