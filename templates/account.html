<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konto</title>
    <style>
        :root { color-scheme: light; --bg:#eef2f6; --panel:#fff; --line:#d8dee4; --text:#17202a; --muted:#667085; }
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        header { position: sticky; top: 0; z-index: 5; background: rgba(255,255,255,0.97); border-bottom: 1px solid var(--line); padding: 0.85rem 1rem; backdrop-filter: blur(8px); }
        main { padding: 0.85rem; max-width: 1120px; margin: 0 auto; }
        .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 0.9rem; margin-bottom: 0.9rem; }
        h1 { margin: 0 0 0.35rem; font-size: 1.25rem; }
        p { margin: 0; color: var(--muted); }
        .line { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 0.75rem; }
        .badge { display: inline-flex; align-items: center; min-height: 1.7rem; border-radius: 999px; padding: 0.2rem 0.62rem; background: #f0edf5; color: #726189; border: 1px solid #cec4db; font-weight: 750; }
        @media (min-width: 760px) { main { padding: 1.25rem; } }
    </style>
    <link rel="stylesheet" href="/static/app.css?v=20260524-owner3">
</head>
<body class="theme-admin">
    {% include "_header.html" %}
    <main>
        <section class="panel">
            <h1>Konto</h1>
            <p>Innlogget bruker og tilgangsnivå.</p>
            <div class="line">
                <span class="badge">{{ request.state.access_key_name or "Ukjent bruker" }}</span>
                <span class="badge">{% if request.state.auth_is_master %}Master{% elif request.state.auth_role == "settings" %}Innstillinger{% else %}Vanlig bruker{% endif %}</span>
            </div>
        </section>
    </main>
</body>
</html>
