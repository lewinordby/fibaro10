<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Data</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 1rem;
            background: #f9f9f9;
        }
        h1 { text-align: center; }
        .nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        form {
            margin-bottom: 1rem;
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        input { padding: 0.45rem; }
        button, a.button {
            padding: 0.5rem 0.75rem;
            border: 1px solid #ccc;
            background: white;
            color: #111;
            text-decoration: none;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 0.9rem;
            vertical-align: top;
        }
        th { background-color: #f0f0f0; }
        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { display: none; }
            td {
                position: relative;
                padding-left: 50%;
                border: none;
                border-bottom: 1px solid #ddd;
            }
            td::before {
                position: absolute;
                top: 0;
                left: 0;
                width: 45%;
                padding-left: 0.75rem;
                font-weight: bold;
                white-space: nowrap;
            }
            td:nth-of-type(1)::before { content: "ID"; }
            td:nth-of-type(2)::before { content: "Temp"; }
            td:nth-of-type(3)::before { content: "Fukt"; }
            td:nth-of-type(4)::before { content: "Tid"; }
            td:nth-of-type(5)::before { content: "Kilde"; }
        }
    </style>
</head>
<body>
    <h1>Sensor Data</h1>

    <div class="nav">
        <a class="button" href="/events">Strukturerte events</a>
        <a class="button" href="/download{% if source or source_contains %}?{% if source %}source={{ source }}{% endif %}{% if source and source_contains %}&{% endif %}{% if source_contains %}source_contains={{ source_contains }}{% endif %}{% endif %}">Last ned CSV</a>
    </div>

    <form method="get" action="/">
        <input type="text" name="source" placeholder="Eksakt kilde..." value="{{ source }}">
        <input type="text" name="source_contains" placeholder="Kilde inneholder..." value="{{ source_contains }}">
        <input type="number" name="limit" min="1" max="1000" value="{{ limit }}">
        <button type="submit">Filtrer</button>
        <a class="button" href="/">Nullstill</a>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Temp</th>
                <th>Fukt</th>
                <th>Tid</th>
                <th>Kilde</th>
            </tr>
        </thead>
        <tbody>
            {% for row in rows %}
            <tr>
                <td>{{ row.id }}</td>
                <td>{{ "%.1f"|format(row.temperature or 0) }}</td>
                <td>{{ "%.1f"|format(row.humidity or 0) }}</td>
                <td>{{ row.timestamp.strftime("%Y-%m-%d %H:%M:%S") }}</td>
                <td>{{ row.source }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
